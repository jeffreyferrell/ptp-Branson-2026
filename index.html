.room-dot.shared{background:#7b5ea7}

.view{display:none}
.view.active{display:block}

function sessionKey(s){return s.Monitor_Name+'|'+s.Date+'|'+s.Start_Time+'|'+s.Room}
function switchTab(t){
  document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('active')});
  document.querySelectorAll('.view').forEach(function(x){x.classList.remove('active')});
  document.getElementById('tab-'+t).classList.add('active');
  document.getElementById('view-'+t).classList.add('active');
}

// Monitor dropdown
var monitors=[...new Set(DATA.map(function(r){return r.Monitor_Name}))].sort();
var monitorSelect=document.getElementById('monitorSelect');
monitors.forEach(function(name){var o=document.createElement('option');o.value=name;o.textContent=name;monitorSelect.appendChild(o)});
monitorSelect.addEventListener('change',function(){
  if(monitorSelect.value)renderMonitorSchedule(monitorSelect.value);
  else{document.getElementById('monitor-content').innerHTML='<div class="empty-state"><div class="icon">&#128203;</div><p>Select your name above</p></div>';document.getElementById('monitor-summary').style.display='none'}
});

// Day dropdown with smart default
var EVENT_DATES=[...new Set(DATA.map(function(r){return r.Date}))].sort();
var FIRST_DATE=EVENT_DATES[0];
function getDefaultDate(){
  var t=new Date().toISOString().split('T')[0];
  if(EVENT_DATES.indexOf(t)>=0)return t;
  if(t<FIRST_DATE)return FIRST_DATE;
  var last=EVENT_DATES[EVENT_DATES.length-1];
  if(t>last)return last;
  return EVENT_DATES.find(function(d){return d>=t})||FIRST_DATE;
}
var dayMap=new Map(DATA.map(function(r){return[r.Date,r.Day_of_Week]}));
var days=[...dayMap.entries()].sort(function(a,b){return a[0].localeCompare(b[0])});
var daySelect=document.getElementById('daySelect');
var defaultDate=getDefaultDate();
days.forEach(function(entry){
  var o=document.createElement('option');
  o.value=entry[0];
  o.textContent=entry[1]+', July '+parseInt(entry[0].split('-')[2]);
  if(entry[0]===defaultDate)o.selected=true;
  daySelect.appendChild(o);
});
renderRoomView(defaultDate);
daySelect.addEventListener('change',function(){if(daySelect.value)renderRoomView(daySelect.value)});

function renderMonitorSchedule(name){
  var sessions=DATA.filter(function(r){return r.Monitor_Name===name});
  var submitted=getSubmitted();
  var dayGroups={};
  sessions.forEach(function(s){
    if(!dayGroups[s.Date])dayGroups[s.Date]={label:s.Day_of_Week+', July '+parseInt(s.Date.split('-')[2]),sessions:[]};
    dayGroups[s.Date].sessions.push(s);
  });
  var submittedCount=sessions.filter(function(s){return submitted[sessionKey(s)]!==undefined}).length;
  var summaryEl=document.getElementById('monitor-summary');
  summaryEl.style.display='block';
  summaryEl.innerHTML=name+' &bull; <span class="total-badge">'+sessions.length+' sessions</span>'+(submittedCount>0?' &bull; &#10003; '+submittedCount+' logged':'');
  var html='';
  Object.keys(dayGroups).sort().forEach(function(dateKey){
    var day=dayGroups[dateKey];
    html+='<div class="day-group"><div class="day-header">'+day.label+'</div>';
    day.sessions.forEach(function(s){
      var isMulti=s.Multi_Speaker==='Yes';
      var isShared=s.Is_Shared==='Yes';
      var key=sessionKey(s);
      var prevCount=submitted[key];
      var isSubmitted=prevCount!==undefined;
      var safeKey=key.replace(/[|: ]/g,'_');
      SESSION_MAP[safeKey]=s;
      var cardClass=isShared?'shared':(isMulti?'multi':'');
      html+='<div class="session-card '+cardClass+'" id="card-'+safeKey+'">';
      html+='<div class="session-time">'+s.Start_Time+' – '+s.End_Time+'</div>';
      html+='<div class="session-room">'+s.Room+'</div>';
      html+='<div class="session-meta">';
      if(isShared)html+='<span class="badge badge-shared">Shared Monitor</span>';
      if(isMulti)html+='<span class="badge badge-multi">Multi-Speaker</span>';
      if(s.Track)html+='<span class="badge badge-track">'+s.Track+'</span>';
      if(isSubmitted)html+='<span class="badge badge-submitted" id="badge-'+safeKey+'">✓ '+prevCount+' logged</span>';
      html+='</div>';
      html+='<div class="attendance-row">';
      html+='<span class="attendance-label">Count:</span>';
      html+='<input class="attendance-input" type="number" min="0" max="999" inputmode="numeric" value="'+(isSubmitted?prevCount:'')+'" id="input-'+safeKey+'"/>';
      html+='<button class="'+(isSubmitted?'btn-submitted':'btn-submit')+'" id="btn-'+safeKey+'" data-key="'+safeKey+'" onclick="submitAttendance(this)">'+(isSubmitted?'✓ Update':'Log Attendance')+'</button>';
      html+='</div></div>';
    });
    html+='</div>';
  });
  document.getElementById('monitor-content').innerHTML=html;
}

function renderRoomView(date){
  var sessions=ROOM_DATA.filter(function(r){return r.Date===date});
  if(!sessions.length){document.getElementById('room-content').innerHTML='<div class="empty-state"><div class="icon">&#127963;</div><p>No sessions found</p></div>';return}
  var dow=sessions[0].Day_of_Week;
  var dayLabel=dow+', July '+parseInt(date.split('-')[2]);
  var timeSlots={};
  sessions.forEach(function(s){
    var k=s.Start_Time+'||'+s.End_Time;
    if(!timeSlots[k])timeSlots[k]={start:s.Start_Time,end:s.End_Time,byRoom:{}};
    timeSlots[k].byRoom[s.Room]=s;
  });
  var summaryEl=document.getElementById('room-summary');
  summaryEl.style.display='block';
  summaryEl.innerHTML=dayLabel+' &bull; <span class="total-badge">'+sessions.length+' sessions</span>';
  function toMins(t){var p=t.split(' ');var hm=p[0].split(':');var h=parseInt(hm[0]),m=parseInt(hm[1]);if(p[1]==='PM'&&h!==12)h+=12;if(p[1]==='AM'&&h===12)h=0;return h*60+m}
  var sortedSlots=Object.values(timeSlots).sort(function(a,b){return toMins(a.start)-toMins(b.start)});
  var html='';
  sortedSlots.forEach(function(slot){
    var active=ROOM_ORDER.filter(function(r){return slot.byRoom[r]});
    if(!active.length)return;
    html+='<div class="time-block"><div class="time-block-header">'+slot.start+' – '+slot.end+'</div>';
    ROOM_ORDER.forEach(function(room){
      var s=slot.byRoom[room];
      if(!s)return;
      var isShared=s.Monitor_Name&&s.Monitor_Name.indexOf(' / ')>=0;
      var isMulti=s.Multi_Speaker==='Yes';
      var dotClass=isShared?'shared':(isMulti?'multi':'');
      html+='<div class="room-row"><div class="room-dot '+dotClass+'"></div><div class="room-name">'+room+'</div><div class="monitor-name">'+s.Monitor_Name+'</div></div>';
    });
    html+='</div>';
  });
  document.getElementById('room-content').innerHTML=html;
}

function submitAttendance(btnEl){
  var safeKey=btnEl.getAttribute('data-key');
  var session=SESSION_MAP[safeKey];
  if(!session){showToast('Session not found',true);return}
  var key=sessionKey(session);
  var input=document.getElementById('input-'+safeKey);
  var count=input.value.trim();
  if(count===''||isNaN(count)||parseInt(count)<0){showToast('Please enter a valid headcount',true);return}
  btnEl.disabled=true;
  btnEl.textContent='Saving...';
  // Form-based submission - most reliable with Google Apps Script
  var iframe=document.getElementById('hidden-iframe');
  iframe.onload=function(){
    markSubmitted(key,parseInt(count));
    btnEl.disabled=false;
    btnEl.className='btn-submitted';
    btnEl.textContent='✓ Update';
    var badge=document.getElementById('badge-'+safeKey);
    if(badge)badge.textContent='✓ '+count+' logged';
    else{
      var nb=document.createElement('span');
      nb.className='badge badge-submitted';
      nb.id='badge-'+safeKey;
      nb.textContent='✓ '+count+' logged';
      document.getElementById('card-'+safeKey).querySelector('.session-meta').appendChild(nb);
    }
    renderSummaryOnly(session.Monitor_Name);
    showToast('Attendance saved! ✓');
    iframe.onload=null;
  };
  var form=document.createElement('form');
  form.method='POST';
  form.action=SCRIPT_URL;
  form.target='hidden-iframe';
  var fields={monitor:session.Monitor_Name,date:session.Date,time:session.Start_Time+' - '+session.End_Time,room:session.Room,headcount:parseInt(count)};
  Object.keys(fields).forEach(function(k){
    var inp=document.createElement('input');
    inp.type='hidden';inp.name=k;inp.value=fields[k];
    form.appendChild(inp);
  });
  document.body.appendChild(form);
  form.submit();
  document.body.removeChild(form);  });
}

function renderSummaryOnly(name){
  var sessions=DATA.filter(function(r){return r.Monitor_Name===name});
  var submitted=getSubmitted();
  var submittedCount=sessions.filter(function(s){return submitted[sessionKey(s)]!==undefined}).length;
  document.getElementById('monitor-summary').innerHTML=name+' &bull; <span class="total-badge">'+sessions.length+' sessions</span>'+(submittedCount>0?' &bull; ✓ '+submittedCount+' logged':'');
}

function showToast(msg,isError){
  var toast=document.getElementById('toast');
  toast.textContent=msg;
  toast.className='toast'+(isError?' error':'')+' show';
  setTimeout(function(){toast.className='toast'+(isError?' error':'')},3000);
}

if('serviceWorker' in navigator){
  window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){})});
}
</script>
