// Process raw sheet data into app format
function processSheetData(sessions){
  var processed=[];
  var roomData=[];
  var timeRoomMap={};

  // First pass - group by time+room to detect multi-speaker
  sessions.forEach(function(s){
    if(!s.room||!s.start)return;
    var dt=new Date(s.start.replace(' ','T'));
    var date=s.start.substring(0,10);
    var hour=dt.getHours(),min=dt.getMinutes();
    var ampm=hour>=12?'PM':'AM';
    var h12=hour%12||12;
    var startTime=(h12<10?'0':'')+h12+':'+(min<10?'0':'')+min+' '+ampm;
    var edt=new Date(s.end.replace(' ','T'));
    var eh=edt.getHours(),em=edt.getMinutes();
    var eampm=eh>=12?'PM':'AM';
    var eh12=eh%12||12;
    var endTime=(eh12<10?'0':'')+eh12+':'+(em<10?'0':'')+em+' '+eampm;
    var dur=Math.round((edt-dt)/60000);
    var days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    var dow=days[dt.getDay()];
    var key=date+'|'+startTime+'|'+s.room;
    if(!timeRoomMap[key])timeRoomMap[key]={speakers:[],monitor:s.monitor,track:s.track,date:date,dow:dow,startTime:startTime,endTime:endTime,dur:dur,room:s.room,row:s.row};
    if(s.speaker)timeRoomMap[key].speakers.push(s.speaker);
  });

  // Second pass - build records
  Object.keys(timeRoomMap).forEach(function(key){
    var d=timeRoomMap[key];
    var isMulti=d.speakers.length>1;
    var speaker=isMulti?'':( d.speakers[0]||'');
    var monitor=d.monitor||'';
    var records=[];

    // Handle dual monitors (slash separated)
    if(monitor.indexOf(' / ')>=0){
      var names=monitor.split(' / ');
      names.forEach(function(name){
        records.push({
          Monitor_Name:name.trim(),Date:d.date,Day_of_Week:d.dow,
          Start_Time:d.startTime,End_Time:d.endTime,Duration:String(d.dur),
          Room:d.room,Track:d.track||'',Speaker:speaker,
          Multi_Speaker:isMulti?'Yes':'No',Is_Shared:'Yes',row:d.row
        });
      });
      // Also add original for room view
      roomData.push({
        Monitor_Name:monitor,Date:d.date,Day_of_Week:d.dow,
        Start_Time:d.startTime,End_Time:d.endTime,Duration:String(d.dur),
        Room:d.room,Track:d.track||'',Speaker:speaker,
        Multi_Speaker:isMulti?'Yes':'No',Is_Shared:'No',row:d.row
      });
    }else{
      var rec={
        Monitor_Name:monitor,Date:d.date,Day_of_Week:d.dow,
        Start_Time:d.startTime,End_Time:d.endTime,Duration:String(d.dur),
        Room:d.room,Track:d.track||'',Speaker:speaker,
        Multi_Speaker:isMulti?'Yes':'No',Is_Shared:'No',row:d.row
      };
      records.push(rec);
      roomData.push(rec);
    }
    processed=processed.concat(records);
  });

  // Add EHA data
  EHA_DATA.forEach(function(e){
    processed.push(e);
    roomData.push(e);
  });

  return{data:processed,roomData:roomData};
}

// Load data from Google Sheets
function loadData(){
  fetch(API_URL+'?action=getSessions')
  .then(function(r){return r.json()})
  .then(function(sessions){
    var result=processSheetData(sessions);
    DATA=result.data;
    ROOM_DATA=result.roomData;

    // Load monitors
    return fetch(API_URL+'?action=getMonitors');
  })
  .then(function(r){return r.json()})
  .then(function(monitors){
    // Populate monitor dropdown
    var sel=document.getElementById('monitorSelect');
    // Clear existing options except first
    while(sel.options.length>1)sel.remove(1);
    monitors.forEach(function(m){
      var o=document.createElement('option');
      o.value=m;o.textContent=m;sel.appendChild(o);
    });

    // Populate day dropdown
    var EVENT_DATES=[...new Set(DATA.map(function(r){return r.Date}))].sort();
    var FIRST_DATE=EVENT_DATES[0];
    function getDefaultDate(){
      var t=new Date().toISOString().split('T')[0];
      if(EVENT_DATES.indexOf(t)>=0)return t;
      if(t<FIRST_DATE)return FIRST_DATE;
      var last=EVENT_DATES[EVENT_DATES.length-1];
      if(t>last)return last;
      return EVENT_DATES.find(function(d){return d>=t})||FIRST_DATE;
    }
    var dayMap=new Map(DATA.map(function(r){return[r.Date,r.Day_of_Week]}));
    var days=[...dayMap.entries()].sort(function(a,b){return a[0].localeCompare(b[0])});
    var daySelect=document.getElementById('daySelect');
    while(daySelect.options.length>0)daySelect.remove(0);
    var defaultDate=getDefaultDate();
    days.forEach(function(entry){
      var o=document.createElement('option');
      o.value=entry[0];
      o.textContent=entry[1]+', July '+parseInt(entry[0].split('-')[2]);
      if(entry[0]===defaultDate)o.selected=true;
      daySelect.appendChild(o);
    });

    document.getElementById('monitor-content').innerHTML='<div class="empty-state"><div class="icon">&#128203;</div><p>Select your name above to see your schedule</p></div>';
    renderRoomView(defaultDate);
  })
  .catch(function(err){
    document.getElementById('monitor-content').innerHTML='<div class="empty-state"><div class="icon">&#128203;</div><p>Could not load schedule. Please check your connection and refresh.</p></div>';
    showToast('Could not load data',true);
  });
}

// Load data on startup
loadData();

var monitorSelect=document.getElementById('monitorSelect');
monitorSelect.addEventListener('change',function(){
  if(monitorSelect.value)renderMonitorSchedule(monitorSelect.value);
  else{
    document.getElementById('monitor-content').innerHTML='<div class="empty-state"><div class="icon">&#128203;</div><p>Select your name above</p></div>';
    document.getElementById('monitor-summary').style.display='none';
  }
});

var daySelect=document.getElementById('daySelect');
daySelect.addEventListener('change',function(){if(daySelect.value)renderRoomView(daySelect.value)});

function renderMonitorSchedule(name){
  var sessions=DATA.filter(function(r){return r.Monitor_Name===name});
  var submitted=getSubmitted();
  var dayGroups={};
  sessions.forEach(function(s){
    if(!dayGroups[s.Date])dayGroups[s.Date]={label:s.Day_of_Week+', July '+parseInt(s.Date.split('-')[2]),sessions:[]};
    dayGroups[s.Date].sessions.push(s);
  });
  var submittedCount=sessions.filter(function(s){return submitted[sessionKey(s)]!==undefined}).length;
  var summaryEl=document.getElementById('monitor-summary');
  summaryEl.style.display='block';
  summaryEl.innerHTML=name+' &bull; <span class="total-badge">'+sessions.length+' sessions</span>'+(submittedCount>0?' &bull; &#10003; '+submittedCount+' submitted':'');
  var html='';
  Object.keys(dayGroups).sort().forEach(function(dateKey){
    var day=dayGroups[dateKey];
    day.sessions.sort(function(a,b){return timeToMins(a.Start_Time)-timeToMins(b.Start_Time)});
    html+='<div class="day-group"><div class="day-header">'+day.label+'</div>';
    day.sessions.forEach(function(s){
      var isMulti=s.Multi_Speaker==='Yes';
      var isShared=s.Is_Shared==='Yes';
      var key=sessionKey(s);
      var prevCount=submitted[key];
      var isSubmitted=prevCount!==undefined;
      var safeKey=key.replace(/[|: ]/g,'_');
      SESSION_MAP[safeKey]=s;
      var cardClass=isShared?'shared':(isMulti?'multi':'');
      var dur=parseInt(s.Duration)||0;
      var durClass=dur<=30?'badge-dur-short':(dur<=45?'badge-dur-medium':'badge-dur-long');
      var durBadge=dur?'<span class="badge '+durClass+'">'+dur+' min</span>':'';
      var pptVal=getSubmittedPPT(key);
      html+='<div class="session-card '+cardClass+'" id="card-'+safeKey+'">';
      html+='<div class="session-time">'+s.Start_Time+' – '+s.End_Time+' '+durBadge+'</div>';
      html+='<div class="session-room">'+s.Room+'</div>';
      if(s.Speaker)html+='<div class="session-speaker">'+s.Speaker+'</div>';
      html+='<div class="session-meta">';
      if(isShared)html+='<span class="badge badge-shared">Shared Monitor</span>';
      if(isMulti)html+='<span class="badge badge-multi">Multi-Speaker</span>';
      if(s.Track)html+='<span class="badge badge-track">'+s.Track+'</span>';
      if(isSubmitted)html+='<span class="badge badge-submitted" id="badge-'+safeKey+'">✓ '+prevCount+' submitted</span>';
      html+='</div>';
      html+='<div class="attendance-row">';
      html+='<span class="attendance-label">Count:</span>';
      html+='<input class="attendance-input" type="number" min="0" max="999" inputmode="numeric" value="'+(isSubmitted?prevCount:'')+'" id="input-'+safeKey+'"/>';
      html+='<span class="attendance-label">PPT:</span>';
      html+='<div class="ppt-buttons">';
      html+='<button class="btn-ppt'+(pptVal==='Yes'?' selected-yes':'')+'" id="ppt-yes-'+safeKey+'" data-key="'+safeKey+'" data-val="Yes" onclick="setPPT(this)">Yes</button>';
      html+='<button class="btn-ppt'+(pptVal==='No'?' selected-no':'')+'" id="ppt-no-'+safeKey+'" data-key="'+safeKey+'" data-val="No" onclick="setPPT(this)">No</button>';
      html+='</div></div>';
      html+='<div class="submit-row">';
      html+='<button class="'+(isSubmitted?'btn-submitted-full':'btn-submit-full')+'" id="btn-'+safeKey+'" data-key="'+safeKey+'" onclick="submitAttendance(this)">'+(isSubmitted?'✓ Update':'Submit')+'</button>';
      html+='</div></div>';
    });
    html+='</div>';
  });
  document.getElementById('monitor-content').innerHTML=html;
}

function renderRoomView(date){
  var sessions=ROOM_DATA.filter(function(r){return r.Date===date});
  if(!sessions.length){document.getElementById('room-content').innerHTML='<div class="empty-state"><div class="icon">&#127963;</div><p>No sessions found</p></div>';return}
  var dow=sessions[0].Day_of_Week;
  var dayLabel=dow+', July '+parseInt(date.split('-')[2]);
  var timeSlots={};
  sessions.forEach(function(s){
    var k=s.Start_Time+'||'+s.End_Time;
    if(!timeSlots[k])timeSlots[k]={start:s.Start_Time,end:s.End_Time,byRoom:{}};
    timeSlots[k].byRoom[s.Room]=s;
  });
  var summaryEl=document.getElementById('room-summary');
  summaryEl.style.display='block';
  summaryEl.innerHTML=dayLabel+' &bull; <span class="total-badge">'+sessions.length+' sessions</span>';
  var sortedSlots=Object.values(timeSlots).sort(function(a,b){return timeToMins(a.start)-timeToMins(b.start)});
  var html='';
  sortedSlots.forEach(function(slot){
    var active=ROOM_ORDER.filter(function(r){return slot.byRoom[r]});
    if(!active.length)return;
    html+='<div class="time-block"><div class="time-block-header">'+slot.start+' – '+slot.end+'</div>';
    ROOM_ORDER.forEach(function(room){
      var s=slot.byRoom[room];
      if(!s)return;
      var isShared=s.Monitor_Name&&s.Monitor_Name.indexOf(' / ')>=0;
      var isMulti=s.Multi_Speaker==='Yes';
      var dotClass=isShared?'shared':(isMulti?'multi':'');
      html+='<div class="room-row"><div class="room-dot '+dotClass+'"></div><div class="room-name">'+room+'</div><div class="monitor-name">'+s.Monitor_Name+'</div></div>';
    });
    html+='</div>';
  });
  document.getElementById('room-content').innerHTML=html;
}

function setPPT(btnEl){
  var safeKey=btnEl.getAttribute('data-key');
  var val=btnEl.getAttribute('data-val');
  var session=SESSION_MAP[safeKey];
  if(!session)return;
  markSubmittedPPT(sessionKey(session),val);
  var yesBtn=document.getElementById('ppt-yes-'+safeKey);
  var noBtn=document.getElementById('ppt-no-'+safeKey);
  if(yesBtn)yesBtn.className='btn-ppt'+(val==='Yes'?' selected-yes':'');
  if(noBtn)noBtn.className='btn-ppt'+(val==='No'?' selected-no':'');
}

function submitAttendance(btnEl){
  var safeKey=btnEl.getAttribute('data-key');
  var session=SESSION_MAP[safeKey];
  if(!session){showToast('Session not found',true);return}
  var key=sessionKey(session);
  var input=document.getElementById('input-'+safeKey);
  var count=input.value.trim();
  if(count===''||isNaN(count)||parseInt(count)<0){showToast('Please enter a valid count',true);return}
  btnEl.disabled=true;
  btnEl.textContent='Saving...';
  var pptVal=getSubmittedPPT(key);
  var params=new URLSearchParams();
  params.append('action','submitAttendance');
  params.append('monitor',session.Monitor_Name);
  params.append('date',session.Date);
  params.append('time',session.Start_Time+' - '+session.End_Time);
  params.append('room',session.Room);
  params.append('headcount',parseInt(count));
  params.append('powerpoint',pptVal||'Not selected');
  fetch(ATTENDANCE_URL,{method:'POST',body:params})
  .then(function(){
    markSubmitted(key,parseInt(count));
    btnEl.disabled=false;
    btnEl.className='btn-submitted-full';
    btnEl.textContent='✓ Update';
    var badge=document.getElementById('badge-'+safeKey);
    if(badge)badge.textContent='✓ '+count+' submitted';
    else{
      var nb=document.createElement('span');
      nb.className='badge badge-submitted';
      nb.id='badge-'+safeKey;
      nb.textContent='✓ '+count+' submitted';
      document.getElementById('card-'+safeKey).querySelector('.session-meta').appendChild(nb);
    }
    renderSummaryOnly(session.Monitor_Name);
    showToast('Submitted! ✓');
  })
  .catch(function(){
    markSubmitted(key,parseInt(count));
    btnEl.disabled=false;
    btnEl.className='btn-submitted-full';
    btnEl.textContent='✓ Update';
    renderSummaryOnly(session.Monitor_Name);
    showToast('Submitted! ✓');
  });
}

function renderSummaryOnly(name){
  var sessions=DATA.filter(function(r){return r.Monitor_Name===name});
  var submitted=getSubmitted();
  var submittedCount=sessions.filter(function(s){return submitted[sessionKey(s)]!==undefined}).length;
  document.getElementById('monitor-summary').innerHTML=name+' &bull; <span class="total-badge">'+sessions.length+' sessions</span>'+(submittedCount>0?' &bull; ✓ '+submittedCount+' submitted':'');
}
</script>
