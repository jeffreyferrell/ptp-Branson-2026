<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f0f4f8;color:#1a1a1a;min-height:100vh}
header{background:#1a3a5c;color:white;padding:16px;text-align:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.3)}
header h1{font-size:1.2rem;font-weight:700}
header p{font-size:.8rem;opacity:.8;margin-top:2px}
.controls{padding:14px 16px;background:white;border-bottom:1px solid #dde3ea;display:flex;flex-direction:column;gap:10px}
.controls label{font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:#5a6a7a;display:block;margin-bottom:3px}
select{width:100%;padding:10px 14px;font-size:.95rem;border:2px solid #dde3ea;border-radius:10px;background:#f8fafc;color:#1a1a1a;appearance:none}
select:focus{outline:none;border-color:#1a3a5c}
.content{padding:12px 16px 100px}
.day-group{margin-bottom:20px}
.day-header{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#5a6a7a;padding:8px 0 6px;border-bottom:2px solid #dde3ea;margin-bottom:8px}
.session-card{background:white;border-radius:10px;padding:12px 14px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,0.08);border-left:4px solid #1a3a5c}
.session-card.changed{border-left-color:#2d7a3a;background:#f6fffa}
.session-time{font-size:.85rem;font-weight:700;color:#1a3a5c}
.session-room{font-size:.95rem;font-weight:600;color:#1a1a1a;margin:2px 0}
.session-speaker{font-size:.8rem;color:#5a6a7a;margin-bottom:8px}
.monitor-row{display:flex;align-items:center;gap:8px;margin-top:6px}
.monitor-label{font-size:.75rem;color:#5a6a7a;font-weight:600;white-space:nowrap}
.monitor-select{flex:1;padding:7px 10px;font-size:.85rem;border:2px solid #dde3ea;border-radius:8px;background:#f8fafc}
.monitor-select.changed{border-color:#2d7a3a;background:#f6fffa}
.changed-badge{font-size:.65rem;font-weight:700;background:#2d7a3a;color:white;padding:2px 7px;border-radius:20px;white-space:nowrap}
.save-bar{position:fixed;bottom:0;left:0;right:0;background:white;padding:14px 16px;border-top:2px solid #dde3ea;display:flex;gap:10px;align-items:center}
.save-count{font-size:.85rem;color:#5a6a7a;flex:1}
.btn-save{padding:12px 24px;background:#1a3a5c;color:white;border:none;border-radius:10px;font-size:.95rem;font-weight:700;cursor:pointer}
.btn-save:disabled{background:#a0b4c8;cursor:not-allowed}
.btn-reset{padding:12px 16px;background:#f0f4f8;color:#5a6a7a;border:2px solid #dde3ea;border-radius:10px;font-size:.85rem;font-weight:600;cursor:pointer}
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-200px);background:#2d7a3a;color:white;padding:12px 24px;border-radius:24px;font-size:.9rem;font-weight:600;box-shadow:0 4px 12px rgba(0,0,0,.2);transition:transform .3s ease;z-index:999;text-align:center;max-width:90vw}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.error{background:#c0392b}
.empty{text-align:center;padding:40px 20px;color:#5a6a7a}
</style>
</head>

// changes stores: sessionIndex -> newMonitorName
var changes={};

function timeToMins(t){var p=t.split(' ');var hm=p[0].split(':');var h=parseInt(hm[0]),m=parseInt(hm[1]);if(p[1]==='PM'&&h!==12)h+=12;if(p[1]==='AM'&&h===12)h=0;return h*60+m}

// Populate filters
var mf=document.getElementById('monitorFilter');
MONITORS.forEach(function(m){var o=document.createElement('option');o.value=m;o.textContent=m;mf.appendChild(o)});
var rf=document.getElementById('roomFilter');
var rooms=[...new Set(SESSIONS.map(function(s){return s.Room}))].sort();
rooms.forEach(function(r){var o=document.createElement('option');o.value=r;o.textContent=r;rf.appendChild(o)});

document.getElementById('dayFilter').addEventListener('change',render);
document.getElementById('monitorFilter').addEventListener('change',render);
document.getElementById('roomFilter').addEventListener('change',render);

function getMonitor(idx){return changes[idx]!==undefined?changes[idx]:SESSIONS[idx].Monitor_Name}

function render(){
  var dayVal=document.getElementById('dayFilter').value;
  var monVal=document.getElementById('monitorFilter').value;
  var roomVal=document.getElementById('roomFilter').value;
  if(!dayVal&&!monVal&&!roomVal){document.getElementById('content').innerHTML='<div class="empty">Select a filter above to view sessions</div>';return}

  var filtered=[];
  SESSIONS.forEach(function(s,i){
    var cur=getMonitor(i);
    if(dayVal&&s.Date!==dayVal)return;
    if(monVal&&cur!==monVal)return;
    if(roomVal&&s.Room!==roomVal)return;
    filtered.push({session:s,idx:i});
  });

  filtered.sort(function(a,b){
    if(a.session.Date!==b.session.Date)return a.session.Date.localeCompare(b.session.Date);
    return timeToMins(a.session.Start_Time)-timeToMins(b.session.Start_Time);
  });

  if(!filtered.length){document.getElementById('content').innerHTML='<div class="empty">No sessions found</div>';return}

  var groups={};
  filtered.forEach(function(item){
    var s=item.session;
    var label=s.Day_of_Week+', July '+parseInt(s.Date.split('-')[2]);
    if(!groups[s.Date])groups[s.Date]={label:label,items:[]};
    groups[s.Date].items.push(item);
  });

  var html='';
  Object.keys(groups).sort().forEach(function(date){
    var g=groups[date];
    html+='<div class="day-group"><div class="day-header">'+g.label+'</div>';
    g.items.forEach(function(item){
      var s=item.session;
      var i=item.idx;
      var cur=getMonitor(i);
      var isChanged=changes[i]!==undefined;
      html+='<div class="session-card'+(isChanged?' changed':'')+'" id="card-'+i+'">';
      html+='<div class="session-time">'+s.Start_Time+' – '+s.End_Time+'</div>';
      html+='<div class="session-room">'+s.Room+'</div>';
      if(s.Speaker)html+='<div class="session-speaker">'+s.Speaker+'</div>';
      html+='<div class="monitor-row"><span class="monitor-label">Monitor:</span>';
      html+='<select class="monitor-select'+(isChanged?' changed':'')+'" data-idx="'+i+'" onchange="handleChange(this)">';
      MONITORS.forEach(function(m){html+='<option value="'+m+'"'+(m===cur?' selected':'')+'>'+m+'</option>'});
      html+='</select>';
      if(isChanged)html+='<span class="changed-badge" id="badge-'+i+'">Changed</span>';
      html+='</div></div>';
    });
    html+='</div>';
  });
  document.getElementById('content').innerHTML=html;
}

function handleChange(sel){
  var i=parseInt(sel.getAttribute('data-idx'));
  var orig=SESSIONS[i].Monitor_Name;
  if(sel.value===orig){delete changes[i]}else{changes[i]=sel.value}
  updateSaveBar();
  var card=document.getElementById('card-'+i);
  if(card){
    card.className='session-card'+(changes[i]!==undefined?' changed':'');
    sel.className='monitor-select'+(changes[i]!==undefined?' changed':'');
    var badge=document.getElementById('badge-'+i);
    if(changes[i]!==undefined&&!badge){var nb=document.createElement('span');nb.className='changed-badge';nb.id='badge-'+i;nb.textContent='Changed';sel.parentNode.appendChild(nb)}
    else if(changes[i]===undefined&&badge){badge.remove()}
  }
}

function updateSaveBar(){
  var count=Object.keys(changes).length;
  document.getElementById('saveCount').textContent=count?count+' change'+(count>1?'s':'')+' pending':'No changes yet';
  document.getElementById('saveBtn').disabled=count===0;
}

function resetChanges(){changes={};updateSaveBar();render()}

function showToast(msg,isError){
  var t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast'+(isError?' error':'')+' show';
  setTimeout(function(){t.className='toast'+(isError?' error':'')},4000);
}

  showToast('Fetching current app file...');
  try{
    // Get current file from GitHub
    var resp=await fetch('https://api.github.com/repos/'+OWNER+'/'+REPO+'/contents/index.html',{
      headers:{'Authorization':'token '+TOKEN,'Accept':'application/vnd.github.v3+json'}
    });
    if(!resp.ok)throw new Error('Could not fetch file ('+resp.status+')');
    var meta=await resp.json();
    var sha=meta.sha;
    // Decode content
    var encoded=meta.content.replace(/\n/g,'');
    // Safely decode base64 content
    var binary=atob(encoded);
    var bytes=new Uint8Array(binary.length);
    for(var b=0;b<binary.length;b++)bytes[b]=binary.charCodeAt(b);
    var content=new TextDecoder('utf-8').decode(bytes);

    // Apply each change
    Object.keys(changes).forEach(function(idxStr){
      var i=parseInt(idxStr);
      var s=SESSIONS[i];
      var oldName=s.Monitor_Name;
      var newName=changes[i];
      // Build a highly specific search string using multiple fields
      var searchStr='"Monitor_Name":"'+oldName+'","Date":"'+s.Date+'","Day_of_Week":"'+s.Day_of_Week+'","Start_Time":"'+s.Start_Time+'","End_Time":"'+s.End_Time+'","Duration":"'+s.Duration+'","Room":"'+s.Room+'"';
      var replaceStr='"Monitor_Name":"'+newName+'","Date":"'+s.Date+'","Day_of_Week":"'+s.Day_of_Week+'","Start_Time":"'+s.Start_Time+'","End_Time":"'+s.End_Time+'","Duration":"'+s.Duration+'","Room":"'+s.Room+'"';
      var count=(content.match(new RegExp(searchStr.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'g'))||[]).length;
      if(count===0){showToast('Warning: pattern not found for '+oldName+' in '+s.Room,true);return}
      content=content.split(searchStr).join(replaceStr);
      // Update local SESSIONS array
      s.Monitor_Name=newName;
    });

    // Push back to GitHub
    showToast('Pushing changes to GitHub...');
    var pushResp=await fetch('https://api.github.com/repos/'+OWNER+'/'+REPO+'/contents/index.html',{
      method:'PUT',
      headers:{'Authorization':'token '+TOKEN,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},
      body:JSON.stringify({
        message:'Monitor update: '+Object.keys(changes).length+' change(s) via admin app',
        content:btoa(new TextEncoder().encode(content).reduce(function(s,b){{return s+String.fromCharCode(b)}},''))  ,
        sha:sha
      })
    });
    if(!pushResp.ok){var e=await pushResp.json();throw new Error(e.message||'Push failed')}
    changes={};
    updateSaveBar();
    btn.textContent='Push to App';
    showToast('Done! App updates in ~60 seconds ✓');
    render();
  }catch(e){
    btn.disabled=false;
    btn.textContent='Push to App';
    showToast('Error: '+e.message,true);
  }
}
</script>
</body>
</html>
